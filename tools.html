<script>

document

.getElementById("themeBtn")

.onclick=()=>{

document.body

.classList.toggle("dark");

localStorage.setItem(

"theme",

document.body

.classList

.contains("dark")

?

"dark"

:

"light"

);

};


if(

localStorage

.getItem("theme")

==="dark"

){

document.body

.classList

.add("dark");

}



document

.getElementById("search")

.addEventListener(

"keyup",

function(){

let value=

this.value

.toLowerCase();

document

.querySelectorAll(".tool")

.forEach(card=>{

card.style.display=

card.innerText

.toLowerCase()

.includes(value)

?

"block"

:

"none";

});

});

</script>
