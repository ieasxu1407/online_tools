<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>404 - 페이지를 찾을 수 없습니다</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{

background:#f5f7fa;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

transition:.3s;

}

.error-box{

max-width:700px;

width:100%;

background:white;

padding:60px;

border-radius:30px;

text-align:center;

box-shadow:

0 15px 40px

rgba(0,0,0,.1);

}

.error-code{

font-size:120px;

font-weight:900;

color:#0d6efd;

line-height:1;

}

.error-title{

font-size:35px;

font-weight:bold;

margin-top:20px;

}

.error-desc{

font-size:18px;

color:#6c757d;

margin-top:15px;

margin-bottom:40px;

}

.btn-home{

padding:12px 30px;

font-size:18px;

border-radius:15px;

}

.dark{

background:#121212;

color:white;

}

.dark .error-box{

background:#1f1f1f;

}

.dark .error-desc{

color:#ccc;

}

</style>

</head>

<body>



<div class="error-box">


<div class="error-code">

404

</div>




<div class="error-title">

페이지를 찾을 수 없습니다

</div>




<div class="error-desc">

입력한 주소가 잘못되었거나

페이지가 이동 또는 삭제되었을 수 있습니다.

</div>





<div class="d-flex

justify-content-center

gap-3

flex-wrap">



<a

href="/online_tools/"

class="btn btn-primary btn-home">

메인페이지

</a>




<button

class="btn btn-outline-secondary btn-home"

onclick="history.back()">

이전 페이지

</button>



<button

class="btn btn-dark btn-home"

id="themeBtn">

다크모드

</button>


</div>



</div>





<script>

const themeBtn=

document

.getElementById("themeBtn");



themeBtn.onclick=()=>{


document.body

.classList

.toggle("dark");



localStorage

.setItem(

"theme",

document.body

.classList

.contains("dark")

?

"dark"

:

"light"

);

};



if(

localStorage

.getItem("theme")

==="dark"

){

document.body

.classList

.add("dark");

}

</script>

</body>

</html>
