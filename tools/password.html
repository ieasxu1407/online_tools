<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>비밀번호 생성기</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{

background:#f5f7fa;

padding-top:80px;

transition:.3s;

}

.password-box{

max-width:700px;

margin:auto;

padding:40px;

background:white;

border-radius:25px;

box-shadow:

0 10px 30px

rgba(0,0,0,.1);

}

.result{

font-size:28px;

font-weight:bold;

word-break:break-all;

padding:20px;

border-radius:15px;

background:#f8f9fa;

margin-bottom:20px;

text-align:center;

min-height:80px;

}

.dark{

background:#121212;

color:white;

}

.dark .navbar{

background:#000!important;

}

.dark .password-box{

background:#1f1f1f;

color:white;

}

.dark .result{

background:#2a2a2a;

color:white;

}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">

<div class="container">

<a class="navbar-brand fw-bold"

href="../index.html">

Online Tools

</a>

<button

class="navbar-toggler"

type="button"

data-bs-toggle="collapse"

data-bs-target="#navbar">

<span class="navbar-toggler-icon">

</span>

</button>

<div

class="collapse navbar-collapse"

id="navbar">

<ul class="navbar-nav me-auto">

<li class="nav-item">

<a class="nav-link"

href="../index.html">

홈

</a>

</li>

<li class="nav-item">

<a class="nav-link"

href="../tools.html">

전체도구

</a>

</li>

<li class="nav-item">

<a class="nav-link"

href="../notice.html">

공지사항

</a>

</li>

</ul>

<button

class="btn btn-light"

id="themeBtn">

🌙

</button>

</div>

</div>

</nav>




<div class="container">

<div class="password-box">


<h1 class="text-center mb-4">

<i class="bi bi-shield-lock"></i>

비밀번호 생성기

</h1>




<div

class="result"

id="result">

비밀번호가 여기에 표시됩니다

</div>





<label>

길이

<span id="lengthValue">

12

</span>

</label>


<input

type="range"

class="form-range"

min="4"

max="64"

value="12"

id="length">





<div class="form-check">

<input

class="form-check-input"

type="checkbox"

checked

id="upper">

<label class="form-check-label">

대문자 포함

</label>

</div>



<div class="form-check">

<input

class="form-check-input"

type="checkbox"

checked

id="lower">

<label class="form-check-label">

소문자 포함

</label>

</div>




<div class="form-check">

<input

class="form-check-input"

type="checkbox"

checked

id="number">

<label class="form-check-label">

숫자 포함

</label>

</div>




<div class="form-check mb-4">

<input

class="form-check-input"

type="checkbox"

checked

id="special">

<label class="form-check-label">

특수문자 포함

</label>

</div>





<div class="progress mb-4">

<div

id="strength"

class="progress-bar"

style="width:0%">

</div>

</div>





<div class="text-center">

<button

class="btn btn-primary"

onclick="generatePassword()">

생성

</button>



<button

class="btn btn-success"

onclick="copyPassword()">

복사

</button>

</div>



</div>

</div>





<script>

const length=

document

.getElementById("length");



const lengthValue=

document

.getElementById("lengthValue");



length.oninput=()=>{

lengthValue.innerHTML=

length.value;

}





function generatePassword(){


let chars="";



if(

document

.getElementById("upper")

.checked

){

chars+="ABCDEFGHIJKLMNOPQRSTUVWXYZ";

}



if(

document

.getElementById("lower")

.checked

){

chars+="abcdefghijklmnopqrstuvwxyz";

}



if(

document

.getElementById("number")

.checked

){

chars+="0123456789";

}



if(

document

.getElementById("special")

.checked

){

chars+="!@#$%^&*()_+-=[]{}";

}




if(chars===""){

alert(

"옵션을 하나 이상 선택하세요."

);

return;

}




let password="";



for(

let i=0;

i<length.value;

i++

){

password+=

chars.charAt(

Math.floor(

Math.random()

*

chars.length

)

);

}




document

.getElementById("result")

.innerHTML=

password;




let percent=0;



if(length.value>=8)

percent+=30;



if(length.value>=12)

percent+=30;



if(

document

.getElementById("special")

.checked

)

percent+=20;



if(

document

.getElementById("number")

.checked

)

percent+=20;



document

.getElementById("strength")

.style.width=

percent+"%";

}



function copyPassword(){


const text=

document

.getElementById("result")

.innerText;



navigator

.clipboard

.writeText(text);



alert(

"복사되었습니다."

);

}





document

.getElementById("themeBtn")

.onclick=()=>{


document.body

.classList

.toggle("dark");



localStorage

.setItem(

"theme",

document.body

.classList

.contains("dark")

?

"dark"

:

"light"

);

};



if(

localStorage

.getItem("theme")

==="dark"

){

document.body

.classList

.add("dark");

}

</script>




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
