<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>QR 코드 생성기</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{

background:#f5f7fa;

padding-top:80px;

transition:.3s;

}

.qr-box{

max-width:700px;

margin:auto;

background:white;

padding:40px;

border-radius:25px;

box-shadow:

0 10px 30px

rgba(0,0,0,.1);

}

#qrcode{

display:flex;

justify-content:center;

margin-top:30px;

}

#qrcode img{

padding:20px;

background:white;

border-radius:20px;

box-shadow:

0 5px 20px

rgba(0,0,0,.1);

}

.dark{

background:#121212;

color:white;

}

.dark .navbar{

background:#000!important;

}

.dark .qr-box{

background:#1f1f1f;

color:white;

}

</style>

</head>

<body>



<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">

<div class="container">

<a class="navbar-brand fw-bold"

href="../index.html">

Online Tools

</a>



<button

class="navbar-toggler"

data-bs-toggle="collapse"

data-bs-target="#navbar">

<span class="navbar-toggler-icon">

</span>

</button>



<div class="collapse navbar-collapse"

id="navbar">

<ul class="navbar-nav me-auto">

<li class="nav-item">

<a class="nav-link"

href="../index.html">

홈

</a>

</li>



<li class="nav-item">

<a class="nav-link"

href="../tools.html">

전체도구

</a>

</li>



<li class="nav-item">

<a class="nav-link"

href="../notice.html">

공지사항

</a>

</li>

</ul>




<button

class="btn btn-light"

id="themeBtn">

🌙

</button>

</div>

</div>

</nav>





<div class="container">

<div class="qr-box">



<h1 class="text-center mb-4">

<i class="bi bi-qr-code"></i>

QR 코드 생성기

</h1>





<div class="input-group">

<input

type="text"

id="text"

class="form-control"

placeholder="텍스트 또는 URL 입력">



<button

class="btn btn-primary"

onclick="generateQR()">

생성

</button>

</div>





<div

id="qrcode">

</div>





<div class="text-center mt-4">

<button

class="btn btn-success"

onclick="downloadQR()">

PNG 다운로드

</button>

</div>



</div>

</div>





<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>


let qr;



function generateQR(){


const text=

document

.getElementById("text")

.value

.trim();




if(text===""){

alert(

"텍스트를 입력하세요."

);

return;

}




const qrcode=

document

.getElementById("qrcode");



qrcode.innerHTML="";




qr=

new QRCode(

qrcode,

{

text:text,

width:250,

height:250

}

);


}





function downloadQR(){


const img=

document

.querySelector(

"#qrcode img"

);




if(!img){

alert(

"먼저 QR코드를 생성하세요."

);

return;

}




const a=

document

.createElement("a");



a.href=

img.src;



a.download=

"qrcode.png";



a.click();


}





document

.getElementById("text")

.addEventListener(

"keypress",

e=>{


if(

e.key==="Enter"

){

generateQR();

}


});






document

.getElementById("themeBtn")

.onclick=()=>{


document.body

.classList

.toggle("dark");



localStorage

.setItem(

"theme",

document.body

.classList

.contains("dark")

?

"dark"

:

"light"

);

};





if(

localStorage

.getItem("theme")

==="dark"

){

document.body

.classList

.add("dark");

}

</script>





<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
