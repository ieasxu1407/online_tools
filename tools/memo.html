<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>메모장</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"

href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{

background:#f5f7fa;

padding-top:80px;

transition:.3s;

}

.memo-box{

max-width:900px;

margin:auto;

padding:35px;

background:white;

border-radius:25px;

box-shadow:

0 10px 30px

rgba(0,0,0,.1);

}

textarea{

width:100%;

height:500px;

resize:none;

border-radius:15px;

padding:20px;

font-size:18px;

border:1px solid #ddd;

outline:none;

}

.info{

margin-top:15px;

color:gray;

}

.dark{

background:#121212;

color:white;

}

.dark .navbar{

background:#000!important;

}

.dark .memo-box{

background:#1f1f1f;

color:white;

}

.dark textarea{

background:#2a2a2a;

color:white;

border:1px solid #444;

}

.dark .info{

color:#ccc;

}

</style>

</head>

<body>



<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">

<div class="container">

<a class="navbar-brand fw-bold"

href="../index.html">

Online Tools

</a>


<button

class="navbar-toggler"

data-bs-toggle="collapse"

data-bs-target="#navbar">

<span class="navbar-toggler-icon">

</span>

</button>


<div class="collapse navbar-collapse"

id="navbar">

<ul class="navbar-nav me-auto">

<li class="nav-item">

<a class="nav-link"

href="../index.html">

홈

</a>

</li>

<li class="nav-item">

<a class="nav-link"

href="../tools.html">

전체도구

</a>

</li>

<li class="nav-item">

<a class="nav-link"

href="../notice.html">

공지사항

</a>

</li>

</ul>


<button

class="btn btn-light"

id="themeBtn">

🌙

</button>

</div>

</div>

</nav>





<div class="container">

<div class="memo-box">


<h1 class="text-center mb-4">

<i class="bi bi-journal-text"></i>

메모장

</h1>




<textarea

id="memo"

placeholder="메모를 입력하세요...">

</textarea>



<div class="info">

글자 수 :

<span id="count">

0

</span>

</div>




<div class="text-center mt-4">


<button

class="btn btn-primary"

onclick="saveMemo()">

저장

</button>



<button

class="btn btn-danger"

onclick="clearMemo()">

모두 지우기

</button>



<button

class="btn btn-success"

onclick="downloadMemo()">

TXT 다운로드

</button>


</div>


</div>

</div>





<script>


const memo=

document

.getElementById("memo");



const count=

document

.getElementById("count");





memo.value=

localStorage

.getItem("memo")

||"";



count.innerHTML=

memo.value.length;





memo.addEventListener(

"input",

()=>{


localStorage

.setItem(

"memo",

memo.value

);



count.innerHTML=

memo.value.length;


});





function saveMemo(){

localStorage

.setItem(

"memo",

memo.value

);


alert("저장되었습니다.");

}




function clearMemo(){


if(

confirm(

"메모를 모두 삭제할까요?"

)

){

memo.value="";



localStorage

.removeItem("memo");



count.innerHTML=0;

}


}




function downloadMemo(){


const blob=

new Blob(

[memo.value],

{

type:"text/plain"

}

);



const a=

document

.createElement("a");



a.href=

URL

.createObjectURL(blob);



a.download=

"memo.txt";



a.click();


}




document

.getElementById("themeBtn")

.onclick=()=>{


document.body

.classList

.toggle("dark");



localStorage

.setItem(

"theme",

document.body

.classList

.contains("dark")

?

"dark"

:

"light"

);

};



if(

localStorage

.getItem("theme")

==="dark"

){

document.body

.classList

.add("dark");

}


</script>




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
