<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>화이트보드</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"

href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{

background:#f5f7fa;

padding-top:80px;

transition:.3s;

}

.board-box{

background:white;

padding:25px;

border-radius:25px;

box-shadow:

0 10px 30px

rgba(0,0,0,.1);

}

.toolbar{

display:flex;

gap:10px;

flex-wrap:wrap;

margin-bottom:20px;

}

canvas{

width:100%;

height:70vh;

border-radius:20px;

background:#234233;

touch-action:none;

cursor:crosshair;

}

.dark{

background:#121212;

color:white;

}

.dark .navbar{

background:#000!important;

}

.dark .board-box{

background:#1f1f1f;

color:white;

}

</style>

</head>

<body>



<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">

<div class="container">

<a class="navbar-brand fw-bold"

href="../index.html">

Online Tools

</a>


<button

class="navbar-toggler"

data-bs-toggle="collapse"

data-bs-target="#navbar">

<span class="navbar-toggler-icon">

</span>

</button>


<div class="collapse navbar-collapse"

id="navbar">

<ul class="navbar-nav me-auto">

<li class="nav-item">

<a class="nav-link"

href="../index.html">

홈

</a>

</li>

<li class="nav-item">

<a class="nav-link"

href="../tools.html">

전체도구

</a>

</li>

<li class="nav-item">

<a class="nav-link"

href="../notice.html">

공지사항

</a>

</li>

</ul>



<button

class="btn btn-light"

id="themeBtn">

🌙

</button>

</div>

</div>

</nav>





<div class="container">

<div class="board-box">


<h1 class="text-center mb-4">

<i class="bi bi-pencil-square"></i>

화이트보드

</h1>




<div class="toolbar">


<input

type="color"

id="color"

class="form-control form-control-color"

value="#ffffff">



<input

type="range"

id="size"

class="form-range"

min="1"

max="30"

value="3"

style="width:150px;">



<button

class="btn btn-warning"

onclick="eraser()">

지우개

</button>



<button

class="btn btn-danger"

onclick="clearCanvas()">

모두 지우기

</button>



<button

class="btn btn-success"

onclick="saveCanvas()">

PNG 저장

</button>


</div>




<canvas

id="canvas">

</canvas>


</div>

</div>





<script>

const canvas=

document

.getElementById("canvas");



const ctx=

canvas.getContext("2d");



canvas.width=

canvas.offsetWidth;



canvas.height=

canvas.offsetHeight;




let drawing=false;



let color=

"#ffffff";



let size=3;





document

.getElementById("color")

.onchange=(e)=>{

color=e.target.value;

}



document

.getElementById("size")

.oninput=(e)=>{

size=e.target.value;

}



function eraser(){

color="#234233";

}



function start(x,y){

drawing=true;

ctx.beginPath();

ctx.moveTo(x,y);

}



function draw(x,y){


if(!drawing)

return;



ctx.lineWidth=size;

ctx.lineCap="round";

ctx.strokeStyle=color;



ctx.lineTo(x,y);

ctx.stroke();

}



function stop(){

drawing=false;

}




canvas.addEventListener(

"mousedown",

e=>{

start(

e.offsetX,

e.offsetY

);

});



canvas.addEventListener(

"mousemove",

e=>{

draw(

e.offsetX,

e.offsetY

);

});



canvas.addEventListener(

"mouseup",

stop);



canvas.addEventListener(

"mouseleave",

stop);






canvas.addEventListener(

"touchstart",

e=>{


e.preventDefault();



const rect=

canvas

.getBoundingClientRect();



start(

e.touches[0].clientX

-

rect.left,

e.touches[0].clientY

-

rect.top

);


});



canvas.addEventListener(

"touchmove",

e=>{


e.preventDefault();



const rect=

canvas

.getBoundingClientRect();



draw(

e.touches[0].clientX

-

rect.left,

e.touches[0].clientY

-

rect.top

);


});



canvas.addEventListener(

"touchend",

stop);





function clearCanvas(){

ctx.clearRect(

0,

0,

canvas.width,

canvas.height

);

}



function saveCanvas(){


const link=

document

.createElement("a");



link.download=

"whiteboard.png";



link.href=

canvas

.toDataURL();



link.click();

}





document

.getElementById("themeBtn")

.onclick=()=>{


document.body

.classList

.toggle("dark");



localStorage

.setItem(

"theme",

document.body

.classList

.contains("dark")

?

"dark"

:

"light"

);

};



if(

localStorage

.getItem("theme")

==="dark"

){

document.body

.classList

.add("dark");

}

</script>





<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
