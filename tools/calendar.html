<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>달력</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{

background:#f5f7fa;

padding-top:80px;

transition:.3s;

}

.calendar-box{

max-width:900px;

margin:auto;

background:white;

padding:35px;

border-radius:25px;

box-shadow:

0 10px 30px

rgba(0,0,0,.1);

}

.calendar-header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

}

.calendar{

display:grid;

grid-template-columns:

repeat(7,1fr);

gap:10px;

}

.day{

background:#f8f9fa;

padding:20px;

border-radius:15px;

text-align:center;

font-weight:bold;

min-height:70px;

}

.week{

background:#0d6efd;

color:white;

}

.today{

background:#198754;

color:white;

}

.dark{

background:#121212;

color:white;

}

.dark .navbar{

background:#000!important;

}

.dark .calendar-box{

background:#1f1f1f;

color:white;

}

.dark .day{

background:#2a2a2a;

color:white;

}

.dark .week{

background:#0d6efd;

}

.dark .today{

background:#198754;

}

</style>

</head>

<body>




<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">

<div class="container">

<a class="navbar-brand fw-bold"

href="../index.html">

Online Tools

</a>



<button

class="navbar-toggler"

data-bs-toggle="collapse"

data-bs-target="#navbar">

<span class="navbar-toggler-icon">

</span>

</button>



<div class="collapse navbar-collapse"

id="navbar">

<ul class="navbar-nav me-auto">

<li class="nav-item">

<a class="nav-link"

href="../index.html">

홈

</a>

</li>

<li class="nav-item">

<a class="nav-link"

href="../tools.html">

전체도구

</a>

</li>

<li class="nav-item">

<a class="nav-link"

href="../notice.html">

공지사항

</a>

</li>

</ul>



<button

class="btn btn-light"

id="themeBtn">

🌙

</button>

</div>

</div>

</nav>






<div class="container">

<div class="calendar-box">



<h1 class="text-center mb-4">

<i class="bi bi-calendar3"></i>

달력

</h1>




<div class="calendar-header">

<button

class="btn btn-primary"

onclick="prevMonth()">

<i class="bi bi-chevron-left"></i>

</button>



<h2 id="monthYear">

</h2>



<button

class="btn btn-primary"

onclick="nextMonth()">

<i class="bi bi-chevron-right"></i>

</button>

</div>





<div class="calendar"

id="calendar">

</div>


</div>

</div>





<script>

const calendar=

document

.getElementById("calendar");



const monthYear=

document

.getElementById("monthYear");



let date=

new Date();





function renderCalendar(){


calendar.innerHTML="";



const year=

date.getFullYear();



const month=

date.getMonth();





monthYear.innerHTML=

year

+

"년 "

+

(month+1)

+

"월";






const weeks=

[

"일",

"월",

"화",

"수",

"목",

"금",

"토"

];



weeks.forEach(w=>{


calendar.innerHTML+=

`

<div class="day week">

${w}

</div>

`;



});






const firstDay=

new Date(

year,

month,

1

).getDay();





const lastDate=

new Date(

year,

month+1,

0

).getDate();





for(

let i=0;

i<firstDay;

i++

){

calendar.innerHTML+=

'<div></div>';

}





const today=

new Date();





for(

let d=1;

d<=lastDate;

d++

){


let cls="day";



if(

d===today.getDate()

&&

month===today.getMonth()

&&

year===today.getFullYear()

){

cls+=" today";

}



calendar.innerHTML+=

`

<div class="${cls}">

${d}

</div>

`;


}


}



function prevMonth(){

date.setMonth(

date.getMonth()-1

);

renderCalendar();

}



function nextMonth(){

date.setMonth(

date.getMonth()+1

);

renderCalendar();

}



renderCalendar();





document

.getElementById("themeBtn")

.onclick=()=>{


document.body

.classList

.toggle("dark");



localStorage

.setItem(

"theme",

document.body

.classList

.contains("dark")

?

"dark"

:

"light"

);


};



if(

localStorage

.getItem("theme")

==="dark"

){

document.body

.classList

.add("dark");

}


</script>





<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
