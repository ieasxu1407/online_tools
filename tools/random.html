<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>랜덤 추첨기</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"

href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{

background:#f5f7fa;

padding-top:80px;

transition:.3s;

}

.random-box{

max-width:800px;

margin:auto;

background:white;

padding:40px;

border-radius:25px;

box-shadow:

0 10px 30px

rgba(0,0,0,.1);

}

textarea{

height:200px;

resize:none;

}

.result{

margin-top:30px;

padding:30px;

border-radius:20px;

background:#f8f9fa;

text-align:center;

font-size:45px;

font-weight:bold;

min-height:120px;

display:flex;

align-items:center;

justify-content:center;

}

.dark{

background:#121212;

color:white;

}

.dark .navbar{

background:#000!important;

}

.dark .random-box{

background:#1f1f1f;

color:white;

}

.dark textarea{

background:#2a2a2a;

color:white;

border:1px solid #444;

}

.dark .result{

background:#2a2a2a;

color:white;

}

</style>

</head>

<body>




<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">

<div class="container">

<a

class="navbar-brand fw-bold"

href="../index.html">

Online Tools

</a>




<button

class="navbar-toggler"

data-bs-toggle="collapse"

data-bs-target="#navbar">

<span class="navbar-toggler-icon">

</span>

</button>




<div

class="collapse navbar-collapse"

id="navbar">

<ul class="navbar-nav me-auto">

<li class="nav-item">

<a

class="nav-link"

href="../index.html">

홈

</a>

</li>

<li class="nav-item">

<a

class="nav-link"

href="../tools.html">

전체도구

</a>

</li>

<li class="nav-item">

<a

class="nav-link"

href="../notice.html">

공지사항

</a>

</li>

</ul>




<button

class="btn btn-light"

id="themeBtn">

🌙

</button>

</div>

</div>

</nav>






<div class="container">

<div class="random-box">


<h1 class="text-center mb-4">

<i class="bi bi-dice-5"></i>

랜덤 추첨기

</h1>




<label class="mb-2">

항목 입력

(한 줄에 하나씩)

</label>



<textarea

class="form-control"

id="items"

placeholder=

"김철수

이영희

박민수">

</textarea>





<div class="text-center mt-4">

<button

class="btn btn-primary"

onclick="pickRandom()">

추첨하기

</button>



<button

class="btn btn-danger"

onclick="clearItems()">

초기화

</button>

</div>





<div

class="result"

id="result">

추첨 결과

</div>



</div>

</div>







<script>

const result=

document

.getElementById("result");



let animation;





function pickRandom(){


const items=

document

.getElementById("items")

.value

.split("\n")

.map(x=>x.trim())

.filter(x=>x!="");





if(

items.length===0

){

alert(

"항목을 입력하세요."

);

return;

}





let count=0;



animation=

setInterval(()=>{


const random=

items[

Math.floor(

Math.random()

*

items.length

)

];



result.innerHTML=

random;



count++;





if(

count>20

){

clearInterval(animation);




const winner=

items[

Math.floor(

Math.random()

*

items.length

)

];



result.innerHTML=

winner;

}


},100);

}





function clearItems(){


document

.getElementById("items")

.value="";



result.innerHTML=

"추첨 결과";



clearInterval(animation);

}








document

.getElementById("themeBtn")

.onclick=()=>{


document.body

.classList

.toggle("dark");



localStorage

.setItem(

"theme",

document.body

.classList

.contains("dark")

?

"dark"

:

"light"

);

};





if(

localStorage

.getItem("theme")

==="dark"

){

document.body

.classList

.add("dark");

}

</script>






<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js">

</script>

</body>

</html>
