<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>시계</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"

href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{

background:#f5f7fa;

padding-top:80px;

transition:.3s;

}

.clock-box{

max-width:700px;

margin:auto;

background:white;

padding:40px;

border-radius:25px;

box-shadow:

0 10px 30px

rgba(0,0,0,.1);

text-align:center;

}

.clock{

width:280px;

height:280px;

border:10px solid #0d6efd;

border-radius:50%;

margin:auto;

position:relative;

background:white;

}

.hand{

position:absolute;

left:50%;

bottom:50%;

transform-origin:bottom;

border-radius:20px;

}

.hour{

width:8px;

height:70px;

background:#000;

margin-left:-4px;

}

.minute{

width:6px;

height:100px;

background:#333;

margin-left:-3px;

}

.second{

width:2px;

height:120px;

background:red;

margin-left:-1px;

}

.center{

position:absolute;

width:16px;

height:16px;

background:#000;

border-radius:50%;

left:50%;

top:50%;

transform:

translate(-50%,-50%);

}

.digital{

font-size:50px;

font-weight:bold;

margin-top:30px;

}

.date{

font-size:24px;

color:gray;

}

.dark{

background:#121212;

color:white;

}

.dark .navbar{

background:#000!important;

}

.dark .clock-box{

background:#1f1f1f;

color:white;

}

.dark .clock{

background:#2a2a2a;

border-color:#0d6efd;

}

.dark .hour{

background:white;

}

.dark .minute{

background:#ddd;

}

.dark .center{

background:white;

}

.dark .date{

color:#ccc;

}

</style>

</head>

<body>



<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">

<div class="container">

<a

class="navbar-brand fw-bold"

href="../index.html">

Online Tools

</a>



<button

class="navbar-toggler"

data-bs-toggle="collapse"

data-bs-target="#navbar">

<span class="navbar-toggler-icon">

</span>

</button>



<div

class="collapse navbar-collapse"

id="navbar">

<ul class="navbar-nav me-auto">

<li class="nav-item">

<a

class="nav-link"

href="../index.html">

홈

</a>

</li>

<li class="nav-item">

<a

class="nav-link"

href="../tools.html">

전체도구

</a>

</li>

<li class="nav-item">

<a

class="nav-link"

href="../notice.html">

공지사항

</a>

</li>

</ul>



<button

class="btn btn-light"

id="themeBtn">

🌙

</button>

</div>

</div>

</nav>






<div class="container">

<div class="clock-box">


<h1 class="mb-4">

<i class="bi bi-clock"></i>

시계

</h1>




<div class="clock">

<div

class="hand hour"

id="hour">

</div>



<div

class="hand minute"

id="minute">

</div>



<div

class="hand second"

id="second">

</div>



<div class="center">

</div>

</div>





<div

class="digital"

id="digital">

00:00:00

</div>




<div

class="date"

id="date">

</div>


</div>

</div>






<script>

function updateClock(){

const now=

new Date();



const h=

now.getHours();

const m=

now.getMinutes();

const s=

now.getSeconds();





const hourDeg=

(h%12)*30

+

m*0.5;



const minuteDeg=

m*6;



const secondDeg=

s*6;





document

.getElementById("hour")

.style.transform=

`translateX(-50%) rotate(${hourDeg}deg)`;



document

.getElementById("minute")

.style.transform=

`translateX(-50%) rotate(${minuteDeg}deg)`;



document

.getElementById("second")

.style.transform=

`translateX(-50%) rotate(${secondDeg}deg)`;






document

.getElementById("digital")

.innerHTML=

String(h)

.padStart(2,"0")

+":"

+

String(m)

.padStart(2,"0")

+":"

+

String(s)

.padStart(2,"0");






document

.getElementById("date")

.innerHTML=

now.getFullYear()

+

"년 "

+

(now.getMonth()+1)

+

"월 "

+

now.getDate()

+

"일";

}



updateClock();

setInterval(updateClock,1000);







document

.getElementById("themeBtn")

.onclick=()=>{


document.body

.classList

.toggle("dark");



localStorage

.setItem(

"theme",

document.body

.classList

.contains("dark")

?

"dark"

:

"light"

);

};





if(

localStorage

.getItem("theme")

==="dark"

){

document.body

.classList

.add("dark");

}

</script>





<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js">

</script>

</body>

</html>
