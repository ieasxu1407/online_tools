<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>타이머</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{

background:#f5f7fa;

padding-top:80px;

transition:.3s;

}

.timer-box{

max-width:700px;

margin:auto;

padding:40px;

background:white;

border-radius:25px;

box-shadow:

0 10px 30px

rgba(0,0,0,.1);

}

.timer-display{

font-size:70px;

font-weight:bold;

text-align:center;

margin:30px 0;

}

.input-time{

font-size:25px;

text-align:center;

}

.btn-custom{

min-width:120px;

}

.dark{

background:#121212;

color:white;

}

.dark .navbar{

background:#000!important;

}

.dark .timer-box{

background:#1f1f1f;

color:white;

}

</style>

</head>

<body>


<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">

<div class="container">

<a class="navbar-brand fw-bold"

href="../index.html">

Online Tools

</a>


<button

class="navbar-toggler"

data-bs-toggle="collapse"

data-bs-target="#navbar">

<span class="navbar-toggler-icon">

</span>

</button>


<div class="collapse navbar-collapse"

id="navbar">

<ul class="navbar-nav me-auto">

<li class="nav-item">

<a class="nav-link"

href="../index.html">

홈

</a>

</li>

<li class="nav-item">

<a class="nav-link"

href="../tools.html">

전체도구

</a>

</li>

<li class="nav-item">

<a class="nav-link"

href="../notice.html">

공지사항

</a>

</li>

</ul>


<button

class="btn btn-light"

id="themeBtn">

🌙

</button>

</div>

</div>

</nav>




<div class="container">

<div class="timer-box">

<h1 class="text-center">

<i class="bi bi-alarm"></i>

타이머

</h1>


<div class="row mt-4">

<div class="col">

<input

type="number"

id="hours"

class="form-control input-time"

placeholder="시"

min="0"

value="0">

</div>

<div class="col">

<input

type="number"

id="minutes"

class="form-control input-time"

placeholder="분"

min="0"

max="59"

value="0">

</div>

<div class="col">

<input

type="number"

id="seconds"

class="form-control input-time"

placeholder="초"

min="0"

max="59"

value="0">

</div>

</div>




<div

class="timer-display"

id="display">

00:00:00

</div>



<div class="progress mb-4">

<div

class="progress-bar"

id="progress"

style="width:0%">

</div>

</div>



<div class="text-center">

<button

class="btn btn-primary btn-custom"

onclick="startTimer()">

시작

</button>



<button

class="btn btn-warning btn-custom"

onclick="pauseTimer()">

일시정지

</button>



<button

class="btn btn-success btn-custom"

onclick="resumeTimer()">

재개

</button>



<button

class="btn btn-danger btn-custom"

onclick="resetTimer()">

초기화

</button>

</div>

</div>

</div>




<script>

let total=0;

let remain=0;

let timer=null;



function updateDisplay(){

let h=

Math.floor(remain/3600);

let m=

Math.floor((remain%3600)/60);

let s=

remain%60;



document

.getElementById("display")

.innerHTML=

String(h).padStart(2,"0")

+":"

+

String(m).padStart(2,"0")

+":"

+

String(s).padStart(2,"0");



let percent=

((total-remain)

/total)*100;



document

.getElementById("progress")

.style.width=

percent+"%";

}



function startTimer(){


clearInterval(timer);


let h=

parseInt(

document

.getElementById("hours")

.value)||0;



let m=

parseInt(

document

.getElementById("minutes")

.value)||0;



let s=

parseInt(

document

.getElementById("seconds")

.value)||0;



total=

h*3600

+

m*60

+

s;



remain=total;



updateDisplay();



timer=

setInterval(()=>{


if(remain>0){

remain--;

updateDisplay();

}

else{

clearInterval(timer);

alert("시간 종료!");

}


},1000);


}



function pauseTimer(){

clearInterval(timer);

}



function resumeTimer(){

clearInterval(timer);



timer=

setInterval(()=>{


if(remain>0){

remain--;

updateDisplay();

}

else{

clearInterval(timer);

alert("시간 종료!");

}


},1000);


}



function resetTimer(){

clearInterval(timer);

remain=0;

total=0;


document

.getElementById("display")

.innerHTML=

"00:00:00";



document

.getElementById("progress")

.style.width="0%";

}



document

.getElementById("themeBtn")

.onclick=()=>{


document.body

.classList

.toggle("dark");



localStorage

.setItem(

"theme",

document.body

.classList

.contains("dark")

?

"dark"

:

"light"

);

};



if(

localStorage

.getItem("theme")

==="dark"

){

document.body

.classList

.add("dark");

}

</script>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
