<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>날씨</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"

href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{

background:#f5f7fa;

padding-top:80px;

transition:.3s;

}

.weather-box{

max-width:700px;

margin:auto;

padding:40px;

background:white;

border-radius:25px;

box-shadow:

0 10px 30px

rgba(0,0,0,.1);

}

.weather-icon{

width:120px;

height:120px;

}

.temp{

font-size:60px;

font-weight:bold;

}

.info{

font-size:20px;

}

.dark{

background:#121212;

color:white;

}

.dark .navbar{

background:#000!important;

}

.dark .weather-box{

background:#1f1f1f;

color:white;

}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">

<div class="container">

<a class="navbar-brand fw-bold"

href="../index.html">

Online Tools

</a>

<button

class="navbar-toggler"

data-bs-toggle="collapse"

data-bs-target="#navbar">

<span class="navbar-toggler-icon">

</span>

</button>

<div class="collapse navbar-collapse"

id="navbar">

<ul class="navbar-nav me-auto">

<li class="nav-item">

<a class="nav-link"

href="../index.html">

홈

</a>

</li>

<li class="nav-item">

<a class="nav-link"

href="../tools.html">

전체도구

</a>

</li>

<li class="nav-item">

<a class="nav-link"

href="../notice.html">

공지사항

</a>

</li>

</ul>


<button

class="btn btn-light"

id="themeBtn">

🌙

</button>

</div>

</div>

</nav>





<div class="container">

<div class="weather-box">


<h1 class="text-center mb-4">

<i class="bi bi-cloud-sun"></i>

날씨

</h1>




<div class="input-group mb-4">

<input

type="text"

id="city"

class="form-control"

placeholder="도시 입력 (예: Seoul)">



<button

class="btn btn-primary"

onclick="getWeather()">

검색

</button>

</div>




<div

class="text-center"

id="result"

style="display:none;">




<h2 id="cityName">

</h2>



<img

id="icon"

class="weather-icon">



<div

class="temp"

id="temp">

</div>



<div

class="info"

id="desc">

</div>



<div

class="info mt-3">

습도 :

<span id="humidity">

</span>

%

</div>



<div

class="info">

풍속 :

<span id="wind">

</span>

m/s

</div>



</div>

</div>

</div>





<script>

const API_KEY=

"66fab384a2c2aa1be812aeb6526cec44";



async function getWeather(){


const city=

document

.getElementById("city")

.value;



if(city===""){

alert("도시명을 입력하세요.");

return;

}




const url=

`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric&lang=kr`;




try{


const response=

await fetch(url);



const data=

await response.json();




document

.getElementById("result")

.style.display="block";



document

.getElementById("cityName")

.innerHTML=

data.name;




document

.getElementById("temp")

.innerHTML=

Math.round(

data.main.temp

)

+

"°C";



document

.getElementById("desc")

.innerHTML=

data.weather[0].description;



document

.getElementById("humidity")

.innerHTML=

data.main.humidity;



document

.getElementById("wind")

.innerHTML=

data.wind.speed;




document

.getElementById("icon")

.src=

`https://openweathermap.org/img/wn/${data.weather[0].icon}@4x.png`;



}

catch{


alert(

"도시를 찾을 수 없습니다."

);

}


}





document

.getElementById("themeBtn")

.onclick=()=>{


document.body

.classList

.toggle("dark");



localStorage

.setItem(

"theme",

document.body

.classList

.contains("dark")

?

"dark"

:

"light"

);

};



if(

localStorage

.getItem("theme")

==="dark"

){

document.body

.classList

.add("dark");

}

</script>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
