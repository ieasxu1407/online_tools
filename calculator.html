<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>계산기</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{

background:#f5f7fa;

padding-top:80px;

transition:.3s;

}

.calc-box{

max-width:450px;

margin:auto;

background:white;

padding:30px;

border-radius:25px;

box-shadow:

0 10px 30px

rgba(0,0,0,.1);

}

#display{

height:80px;

font-size:32px;

text-align:right;

border-radius:15px;

margin-bottom:20px;

}

.btn-calc{

height:70px;

font-size:25px;

border-radius:15px;

width:100%;

}

.dark{

background:#121212;

color:white;

}

.dark .navbar{

background:#000!important;

}

.dark .calc-box{

background:#1f1f1f;

color:white;

}

.dark #display{

background:#2a2a2a;

color:white;

border:none;

}

</style>

</head>

<body>



<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">

<div class="container">

<a class="navbar-brand fw-bold"

href="../index.html">

Online Tools

</a>



<button

class="navbar-toggler"

data-bs-toggle="collapse"

data-bs-target="#navbar">

<span class="navbar-toggler-icon">

</span>

</button>



<div class="collapse navbar-collapse"

id="navbar">

<ul class="navbar-nav me-auto">

<li class="nav-item">

<a class="nav-link"

href="../index.html">

홈

</a>

</li>

<li class="nav-item">

<a class="nav-link"

href="../tools.html">

전체도구

</a>

</li>

<li class="nav-item">

<a class="nav-link"

href="../notice.html">

공지사항

</a>

</li>

</ul>



<button

class="btn btn-light"

id="themeBtn">

🌙

</button>

</div>

</div>

</nav>





<div class="container">

<div class="calc-box">


<h1 class="text-center mb-4">

<i class="bi bi-calculator"></i>

계산기

</h1>



<input

type="text"

id="display"

class="form-control"

readonly>





<div class="row g-2">

<div class="col-3">

<button

class="btn btn-danger btn-calc"

onclick="clearDisplay()">

C

</button>

</div>

<div class="col-3">

<button

class="btn btn-warning btn-calc"

onclick="backspace()">

⌫

</button>

</div>

<div class="col-3">

<button

class="btn btn-secondary btn-calc"

onclick="append('(')">

(

</button>

</div>

<div class="col-3">

<button

class="btn btn-secondary btn-calc"

onclick="append(')')">

)

</button>

</div>



<div class="col-3">

<button class="btn btn-light btn-calc"

onclick="append('7')">

7

</button>

</div>

<div class="col-3">

<button class="btn btn-light btn-calc"

onclick="append('8')">

8

</button>

</div>

<div class="col-3">

<button class="btn btn-light btn-calc"

onclick="append('9')">

9

</button>

</div>

<div class="col-3">

<button class="btn btn-primary btn-calc"

onclick="append('/')">

÷

</button>

</div>




<div class="col-3">

<button class="btn btn-light btn-calc"

onclick="append('4')">

4

</button>

</div>

<div class="col-3">

<button class="btn btn-light btn-calc"

onclick="append('5')">

5

</button>

</div>

<div class="col-3">

<button class="btn btn-light btn-calc"

onclick="append('6')">

6

</button>

</div>

<div class="col-3">

<button class="btn btn-primary btn-calc"

onclick="append('*')">

×

</button>

</div>




<div class="col-3">

<button class="btn btn-light btn-calc"

onclick="append('1')">

1

</button>

</div>

<div class="col-3">

<button class="btn btn-light btn-calc"

onclick="append('2')">

2

</button>

</div>

<div class="col-3">

<button class="btn btn-light btn-calc"

onclick="append('3')">

3

</button>

</div>

<div class="col-3">

<button class="btn btn-primary btn-calc"

onclick="append('-')">

-

</button>

</div>




<div class="col-3">

<button class="btn btn-light btn-calc"

onclick="append('0')">

0

</button>

</div>

<div class="col-3">

<button class="btn btn-light btn-calc"

onclick="append('.')">

.

</button>

</div>

<div class="col-3">

<button

class="btn btn-success btn-calc"

onclick="calculate()">

=

</button>

</div>

<div class="col-3">

<button class="btn btn-primary btn-calc"

onclick="append('+')">

+

</button>

</div>

</div>


</div>

</div>





<script>

const display=

document

.getElementById("display");



function append(val){

display.value+=val;

}



function clearDisplay(){

display.value="";

}



function backspace(){

display.value=

display.value

.slice(0,-1);

}



function calculate(){

try{

display.value=

eval(display.value);

}

catch{

display.value="Error";

}

}



document

.addEventListener(

"keydown",

e=>{


const allowed=

"0123456789+-*/().";



if(

allowed.includes(e.key)

){

append(e.key);

}



if(

e.key==="Enter"

){

calculate();

}



if(

e.key==="Backspace"

){

backspace();

}



if(

e.key==="Escape"

){

clearDisplay();

}

});






document

.getElementById("themeBtn")

.onclick=()=>{


document.body

.classList

.toggle("dark");



localStorage

.setItem(

"theme",

document.body

.classList

.contains("dark")

?

"dark"

:

"light"

);

};



if(

localStorage

.getItem("theme")

==="dark"

){

document.body

.classList

.add("dark");

}

</script>





<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
